<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfred OS v9.2 - Gustavo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #0a0e27; color: #00ff00; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 15px 20px; border-bottom: 2px solid #ffd700; color: #ffd700; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 12px; color: #00ff00; }
        .status.error { color: #ff4444; }
        .main-container { display: flex; flex: 1; overflow: hidden; gap: 10px; padding: 10px; }
        .sidebar { width: 220px; background: #0f1419; border: 1px solid #ffd700; border-radius: 8px; padding: 15px; overflow-y: auto; }
        .sidebar-title { color: #ffd700; font-weight: bold; margin-bottom: 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .menu-item { padding: 10px; margin-bottom: 8px; background: #1a1a2e; border-radius: 6px; cursor: pointer; font-size: 13px; border: 1px solid #333; transition: all 0.2s; color: #00ff00; }
        .menu-item:hover { background: #2a2a3e; border: 1px solid #ffd700; color: #ffd700; }
        .menu-item.active { background: #ffd700; color: #000; border: 1px solid #ff8800; }
        .content-area { flex: 1; display: flex; flex-direction: column; background: #0f1419; border: 1px solid #ffd700; border-radius: 8px; overflow: hidden; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 12px; border-radius: 6px; font-size: 13px; line-height: 1.4; word-wrap: break-word; }
        .message.user { background: #1a3a1a; border: 1px solid #00ff00; color: #00ff00; align-self: flex-end; max-width: 85%; }
        .message.assistant { background: #1a1a3e; border: 1px solid #ffd700; color: #ffd700; align-self: flex-start; max-width: 85%; }
        .message.system { background: #3e1a1a; color: #ff4444; align-self: center; font-size: 12px; padding: 8px 12px; border: 1px solid #ff4444; }
        .message.julia { background: #2a1a3a; border: 1px solid #ff69b4; color: #ff69b4; align-self: flex-start; max-width: 85%; }
        .input-area { padding: 15px; border-top: 1px solid #ffd700; display: flex; gap: 10px; }
        .input-area input { flex: 1; background: #1a1a2e; border: 1px solid #ffd700; border-radius: 4px; padding: 10px; color: #00ff00; font-family: 'Courier New', monospace; font-size: 13px; }
        .input-area input:focus { outline: none; border: 2px solid #ffd700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .btn { background: #ffd700; color: #000; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s; font-family: 'Courier New', monospace; }
        .btn:hover { background: #ffed4e; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .btn:disabled { background: #666; cursor: not-allowed; }
        .knowledge-box { background: #1a2a1a; border: 1px solid #00ff00; padding: 12px; margin: 10px 0; border-radius: 4px; color: #00ff00; font-size: 12px; }
        .knowledge-box h4 { color: #ffd700; margin-bottom: 8px; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0e27; }
        ::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ffed4e; }
        @media (max-width: 768px) { .main-container { flex-direction: column; } .sidebar { width: 100%; max-height: 120px; overflow-x: auto; display: flex; } .menu-item { white-space: nowrap; flex-shrink: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <div>🦇 Alfred OS v9.2 - GUSTAVO</div>
        <div class="status" id="status">Sistema online</div>
    </div>
    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-title">🔧 Módulos</div>
            <div class="menu-item active" onclick="loadJuliaModule()">💕 Julia - Relacionamento</div>
            <div class="menu-item" onclick="loadKnowledge()">📚 Knowledge Library</div>
            <div class="menu-item" onclick="loadConversas()">💬 Conversas</div>
            <div class="menu-item" onclick="setupAPI()">⚙️ API Setup</div>
            <div class="menu-item" onclick="clearChat()">🗑️ Clear Chat</div>
        </div>
        <div class="content-area">
            <div class="chat-area" id="chatArea">
                <div class="message system">🦇 ALFRED OS v9.2 - SISTEMA OPERACIONAL PESSOAL 🦇</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Digite comando ou mensagem..." onkeypress="handleKeyPress(event)">
                <button class="btn" onclick="sendMessage()">ENVIAR</button>
            </div>
        </div>
    </div>
    <script>
        let apiKey = localStorage.getItem('claudeApiKey') || '';
        let conversationHistory = [];
        let juliaModule = null;
        const juliaKnowledge = {
            nome: 'JULIA - MÓDULO RELACIONAMENTO',
            periodo: '07/07-11/07/2026 (EXAME)',
            apego: 'Avoidant',
            padroes: { carinho: 'Ações > Palavras', comunicacao: 'Breve, humor como escudo', rejeita: 'Carinho óbvio, perguntas diretas, estruturas' },
            cronograma: {
                segunda: '07:00 → "Bom dia, gata. To torcendo por você" | Tarde: Conversa normal | Noite: Boa noite',
                terca: '07:00 → "Bom dia, gata. Vai ser bom pra você" | Tarde: NADA | 19:00 → "Boa noite, to aqui"',
                quarta: '07:00 → "Bom dia, gata. Aproveita esse dia" | 17:00 → "boa tarde mb, tá indo bem?" | 19:00 → "Boa noite mb" | ⚠️ CRÍTICO',
                quinta: '07:00 → "Bom dia, gata. Você tá quase lá" | Tarde: NADA | 19:00 → "Boa noite. Você vai arrasar amanhã, eu tenho certeza"',
                sexta: '07:00 → "Bom dia, gata. Você tá pronta" | DURANTE EXAME: SILÊNCIO | DEPOIS: "Como foi?" → "Você fez, é o que importa"'
            },
            mantra: '"Ela vai desaparecer. Não significa que ela não me ama. Significa que ela está lutando. Meu trabalho é estar ali sem cobrar."',
            warning: '🚨 NÃO QUEBRE O CRONOGRAMA - Se quebrar, ciclo fica 10x pior'
        };
        document.addEventListener('DOMContentLoaded', function() { initializeAlfred(); loadJuliaModule(); });
        function initializeAlfred() { const saved = localStorage.getItem('alfredHistory'); if (saved) { conversationHistory = JSON.parse(saved); displayHistory(); } checkAPIStatus(); }
        function loadJuliaModule() { const chatArea = document.getElementById('chatArea'); chatArea.innerHTML = ''; const html = `<div class="message julia"><strong>💕 JULIA - MÓDULO RELACIONAMENTO</strong><br>Período: ${juliaModule?.periodo || juliaKnowledge.periodo}</div><div class="knowledge-box"><h4>📅 CRONOGRAMA SEMANA</h4><div><strong>SEGUNDA:</strong><br>${juliaKnowledge.cronograma.segunda}</div></div><div class="knowledge-box"><div><strong>TERÇA:</strong><br>${juliaKnowledge.cronograma.terca}</div></div><div class="knowledge-box"><div><strong>QUARTA (CRÍTICO):</strong><br>${juliaKnowledge.cronograma.quarta}</div></div><div class="knowledge-box"><div><strong>QUINTA (SUPER CRÍTICO):</strong><br>${juliaKnowledge.cronograma.quinta}</div></div><div class="knowledge-box"><div><strong>SEXTA (EXAME):</strong><br>${juliaKnowledge.cronograma.sexta}</div></div><div class="knowledge-box" style="background: #3a1a1a; border-color: #ff4444;"><h4 style="color: #ff4444;">⚠️ MANTRA CRÍTICO</h4>${juliaKnowledge.mantra}</div><div class="message system">${juliaKnowledge.warning}</div>`; chatArea.innerHTML = html; addMessage('Assistant', '✅ Módulo Julia carregado. Digite sobre qual dia tem dúvida.'); }
        function loadKnowledge() { addMessage('Assistant', '📚 Knowledge Library carregado. Digite "julia" para ver informações de Julia.'); }
        function loadConversas() { addMessage('Assistant', '💬 Módulo conversas. Envie conversas com Julia aqui para análise em tempo real.'); }
        function setupAPI() { const apiInput = prompt('Cole sua API Key do Claude:\nhttps://console.anthropic.com'); if (apiInput && apiInput.startsWith('sk-')) { localStorage.setItem('claudeApiKey', apiInput); apiKey = apiInput; updateStatus('✅ API conectada'); addMessage('Assistant', '✅ API configurada! Agora posso fazer análises com Claude.'); } else { updateStatus('❌ API inválida'); } }
        function clearChat() { document.getElementById('chatArea').innerHTML = ''; conversationHistory = []; localStorage.removeItem('alfredHistory'); addMessage('Assistant', '🗑️ Chat limpo.'); }
        function handleKeyPress(event) { if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); } }
        function sendMessage() { const input = document.getElementById('messageInput'); const message = input.value.trim(); if (!message) return; addMessage('User', message); input.value = ''; if (message.toLowerCase().includes('julia')) { analyzeJulia(message); } else if (apiKey && message.length > 10) { callClaudeAPI(message); } else { addMessage('Assistant', '💭 Digite sobre Julia ou configure a API para análises mais profundas.'); } }
        function analyzeJulia(msg) { const m = msg.toLowerCase(); if (m.includes('segunda')) { addMessage('Julia', '📅 SEGUNDA: Julia responde bem. Continue normal.'); } else if (m.includes('terça')) { addMessage('Julia', '📅 TERÇA: Silêncio esperado.'); } else if (m.includes('quarta')) { addMessage('Julia', '🔴 QUARTA (CRÍTICO): Desaparecimento TOTAL. NÃO QUEBRE!'); } else if (m.includes('quinta')) { addMessage('Julia', '🔴 QUINTA: Teste real. Presença sem cobrar.'); } else if (m.includes('sexta')) { addMessage('Julia', '🎯 SEXTA: SILÊNCIO durante exame.'); } else { addMessage('Julia', '💕 Digite: segunda, terça, quarta, quinta ou sexta.'); } }
        async function callClaudeAPI(message) { const chatArea = document.getElementById('chatArea'); const loading = document.createElement('div'); loading.className = 'message assistant'; loading.textContent = '⏳ Analisando...'; chatArea.appendChild(loading); chatArea.scrollTop = chatArea.scrollHeight; try { const response = await fetch('https://api.anthropic.com/v1/messages', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' }, body: JSON.stringify({ model: 'claude-opus-4-6', max_tokens: 512, system: 'Você é Alfred. Conhece Julia.', messages: [{ role: 'user', content: message }] }) }); const data = await response.json(); loading.remove(); if (data.content) { addMessage('Assistant', data.content[0].text); } else { addMessage('Assistant', '❌ Erro'); } } catch (error) { loading.textContent = '❌ Erro: ' + error.message; } }
        function addMessage(sender, text) { const chatArea = document.getElementById('chatArea'); const message = document.createElement('div'); message.className = `message ${sender === 'User' ? 'user' : sender === 'Julia' ? 'julia' : sender === 'Assistant' ? 'assistant' : 'system'}`; message.innerHTML = text; chatArea.appendChild(message); chatArea.scrollTop = chatArea.scrollHeight; conversationHistory.push({ sender, text }); localStorage.setItem('alfredHistory', JSON.stringify(conversationHistory.slice(-30))); }
        function displayHistory() { const chatArea = document.getElementById('chatArea'); chatArea.innerHTML = ''; conversationHistory.forEach(msg => { addMessage(msg.sender, msg.text); }); }
        function checkAPIStatus() { const status = document.getElementById('status'); if (apiKey && apiKey.length > 10) { status.textContent = '✅ API: Conectado | Julia: Carregada'; } else { status.textContent = '⚠️ API: Desconectado'; } }
        function updateStatus(text) { document.getElementById('status').textContent = text; }
        setTimeout(() => { addMessage('Assistant', '👋 Alfred pronto! Módulo Julia carregado.'); }, 300);
    </script>
</body>
</html>
